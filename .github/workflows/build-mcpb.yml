name: Build MCPB bundle

# Triggers on every GitHub release publish. Builds the .mcpb via the same
# script developers use locally (scripts/build-mcpb.sh) so what gets attached
# to the release is what they tested. Also runnable manually via
# workflow_dispatch for re-builds or tag testing.
#
# Precondition: @testingbot/automation-mcp must already be on npm at the
# version pinned in package.json. The mcpb build resolves it via `npm ci` —
# nothing here publishes it. The publish order is:
#   1. Bump and publish @testingbot/automation-mcp
#   2. Bump @testingbot/mcp-server's automation-mcp dep + own version
#   3. Tag & create the mcp-server release → this workflow runs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the .mcpb to (e.g., v1.2.0). Required when triggered manually.'
        required: false
        type: string

permissions:
  contents: write  # attaching release assets

jobs:
  build:
    # macOS chosen because appium-mcp pulls in appium-xcuitest-driver, which
    # has macOS-native bits. Building on Linux installs only the linux/no-op
    # variants; users on macOS would then be missing the iOS path. If you
    # only ever target Linux/Windows clients, ubuntu-latest is ~10× cheaper.
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Install dependencies
        run: npm ci

      - name: Build .mcpb
        run: npm run mcpb

      - name: Locate built artefact
        id: artefact
        run: |
          FILE=$(ls releases/*.mcpb | head -1)
          if [[ -z "$FILE" ]]; then
            echo "No .mcpb produced; check scripts/build-mcpb.sh output above." >&2
            exit 1
          fi
          NAME=$(basename "$FILE")
          SIZE=$(du -h "$FILE" | awk '{print $1}')
          echo "file=$FILE"  >> "$GITHUB_OUTPUT"
          echo "name=$NAME"  >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"  >> "$GITHUB_OUTPUT"
          echo "Built $NAME ($SIZE)"

      - name: Upload bundle as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artefact.outputs.name }}
          path: ${{ steps.artefact.outputs.file }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach bundle to release
        # Two conditions get an attached asset:
        #   1. The workflow was triggered by a release publish.
        #   2. A maintainer ran workflow_dispatch with an explicit tag input.
        # Manual runs without a tag input only get the workflow-artifact above.
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artefact.outputs.file }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
